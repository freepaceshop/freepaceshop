<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 線上估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --dark: #1a1a1a; --light: #f4f4f4; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .calc-container { max-width: 1000px; margin: 0 auto; background: white; display: flex; flex-wrap: wrap; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .form-part { flex: 3; padding: 30px; min-width: 300px; }
        .summary-part { flex: 2; padding: 30px; background: #fafafa; border-left: 1px solid #eee; min-width: 250px; }
        
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 25px; font-size: 20px; }
        .row { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #666; }
        select, input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        select:focus { border-color: var(--primary); outline: none; }

        .preview-box { background: #eee; width: 100%; height: 200px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .price-tag { font-size: 32px; font-weight: bold; color: var(--primary); text-align: center; margin: 20px 0; }
        .btn-copy { width: 100%; background: var(--dark); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-copy:hover { background: var(--primary); }
        .summary-content { font-size: 13px; line-height: 1.6; background: white; padding: 15px; border-radius: 6px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="form-part">
        <h2>1. 選擇道具大類</h2>
        <div class="row">
            <select id="mainCat" onchange="initSubCat()">
                <option value="fire_staff">火具 - 棍類 (Staff)</option>
                <option value="fire_poi">火具 - 球類/流星 (Poi/Meteor)</option>
                <option value="practice_staff">練習道具 - 棍類</option>
            </select>
        </div>

        <h2>2. 設定詳細規格</h2>
        <div id="dynamic-fields">
            </div>

        <div class="row">
            <label>數量</label>
            <input type="number" id="qty" value="1" min="1" onchange="calculate()">
        </div>
    </div>

    <div class="summary-part">
        <div class="preview-box">
            <img id="previewImg" src="https://via.placeholder.com/400x300?text=FPS+FIRE+PROPS" alt="Preview">
        </div>
        <div class="price-tag">NT$ <span id="totalPrice">0</span></div>
        <div class="summary-content" id="summaryBox">請開始選擇規格...</div>
        <button class="btn-copy" onclick="copyResult()">複製清單私訊下單</button>
    </div>
</div>

<script>
    // 根據你的 CSV 建立資料庫
    const db = {
        fire_staff: {
            title: "火具棍類",
            items: [
                { name: "單長棍-一體式", base: 1900 },
                { name: "單長棍-組合式", base: 2500 },
                { name: "火短棍-一體式", base: 900 }
            ],
            heads: [
                { name: "10cm 圓柱火頭", plus: 0 },
                { name: "10cm Twista火頭", plus: 800 }
            ],
            options: [
                { name: "標準薄款握把", plus: 0 },
                { name: "輪胎紋加厚款", plus: 50 }
            ],
            lengthNeeded: true
        },
        fire_poi: {
            title: "火具球類",
            items: [
                { name: "火Poi套組", base: 1000 },
                { name: "火流星套組", base: 1300 }
            ],
            heads: [
                { name: "豆干火頭 (6cm)", plus: 0 },
                { name: "Twista火頭 (6cm)", plus: 300 },
                { name: "猴子球火頭 (6cm)", plus: 500 }
            ],
            options: [
                { name: "鐵鍊組", plus: 0 },
                { name: "Technora繩款", plus: 500 }
            ],
            lengthNeeded: false
        }
        // ... 其他類別可依此類推
    };

    function initSubCat() {
        const cat = document.getElementById('mainCat').value;
        const data = db[cat];
        let html = `
            <div class="row">
                <label>具體品項</label>
                <select id="subItem" onchange="calculate()">${data.items.map(i => `<option value="${i.base}">${i.name} (NT$${i.base}起)</option>`).join('')}</select>
            </div>
            <div class="row">
                <label>火頭樣式</label>
                <select id="head" onchange="calculate()">${data.heads.map(h => `<option value="${h.plus}">${h.name} (+NT$${h.plus})</option>`).join('')}</select>
            </div>
            <div class="row">
                <label>額外配件/握把</label>
                <select id="opt" onchange="calculate()">${data.options.map(o => `<option value="${o.plus}">${o.name} (+NT$${o.plus})</option>`).join('')}</select>
            </div>
        `;
        if(data.lengthNeeded) {
            html += `
                <div class="row">
                    <label>長度需求 (150cm內預設不加價)</label>
                    <select id="len" onchange="calculate()">
                        <option value="0">標準長度 (140cm)</option>
                        <option value="400">加長/加厚規格 (+NT$400)</option>
                    </select>
                </div>
            `;
        }
        document.getElementById('dynamic-fields').innerHTML = html;
        calculate();
    }

    function calculate() {
        const cat = document.getElementById('mainCat').value;
        const base = parseInt(document.getElementById('subItem').value);
        const headPlus = parseInt(document.getElementById('head').value);
        const optPlus = parseInt(document.getElementById('opt').value);
        const lenPlus = document.getElementById('len') ? parseInt(document.getElementById('len').value) : 0;
        const qty = parseInt(document.getElementById('qty').value);

        const unitPrice = base + headPlus + optPlus + lenPlus;
        const total = unitPrice * qty;

        document.getElementById('totalPrice').innerText = total.toLocaleString();

        // 更新摘要文字
        const summary = `【FPS 道具部 詢價需求】\n` +
            `● 類別：${db[cat].title}\n` +
            `● 品項：${document.getElementById('subItem').selectedOptions[0].text.split(' (')[0]}\n` +
            `● 火頭：${document.getElementById('head').selectedOptions[0].text.split(' (+')[0]}\n` +
            `● 配件：${document.getElementById('opt').selectedOptions[0].text.split(' (+')[0]}\n` +
            (document.getElementById('len') ? `● 規格：${document.getElementById('len').selectedOptions[0].text}\n` : "") +
            `● 數量：${qty}\n` +
            `--------------------------\n` +
            `預估單價：NT$ ${unitPrice.toLocaleString()}\n` +
            `預估總計：NT$ ${total.toLocaleString()}`;
        
        document.getElementById('summaryBox').innerText = summary;
    }

    function copyResult() {
        const text = document.getElementById('summaryBox').innerText;
        navigator.clipboard.writeText(text).then(() => alert("估價單已複製！請貼給粉專私訊即可。"));
    }

    // 初始化頁面
    initSubCat();
</script>

</body>
</html>
