<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" id="dynamicFavicon" href="https://raw.githubusercontent.com/freepaceshop/freepaceshop/refs/heads/main/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; margin: 0; padding: 0; color: var(--text-dark); overflow-x: hidden;
        }

        /* 導覽列 */
        .nav-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #ffffff; border-bottom: 1px solid #eee;
            position: fixed; top: 0; left: 0; width: 90%; z-index: 900;
        }
        .nav-logo { font-size: 1.4rem; font-weight: 700; color: #111; text-decoration: none; }
        
        .cart-trigger {
            background: #111; color: white; padding: 10px 18px; border-radius: 20px;
            cursor: pointer; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: background 0.2s;
        }
        .cart-trigger:hover { background: var(--primary); }
        .cart-count { background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 7px; font-size: 0.75rem; }

        /* 💡 左右雙欄主要佈局 (左側圖文 : 右側按鈕 = 1:1) */
        .item-container { 
            padding: 100px 5% 60px 5%; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        @media (max-width: 850px) { .item-container { grid-template-columns: 1fr; gap: 30px; } }
        
        .back-link { display: inline-block; color: #666; text-decoration: none; font-size: 0.9rem; margin-bottom: 15px; }
        .back-link:hover { color: var(--primary); }

        /* 💡 左側：商品大圖與規格介紹區 */
        .product-info-panel { position: sticky; top: 100px; height: fit-content; }
        .main-product-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; background: #fafafa; margin-bottom: 20px; border: 1px solid #eee; }
        .product-details-content { background: #fdfdfd; border: 1px dashed var(--border-color); padding: 20px; border-radius: 8px; font-size: 0.92rem; color: #444; line-height: 1.6; }
        .product-details-content h4 { margin: 0 0 10px 0; font-size: 1.05rem; color: #111; font-weight: 700; border-left: 3px solid var(--primary); padding-left: 8px; }

        /* 右側：客製化選項區 */
        .spec-hint-text {
            font-size: 0.85rem; color: #555; margin-bottom: 25px; font-weight: 500;
            background: #fff6ee; padding: 12px 16px; border-radius: 6px; border-left: 4px solid var(--primary);
        }

        h2 { font-size: 1.1rem; font-weight: 700; color: #111; margin: 25px 0 12px 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }

        /* 按鈕視覺網格 */
        .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .spec-btn {
            background: #fff; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px;
            cursor: pointer; text-align: center; transition: all 0.2s ease; color: #444; font-weight: 500;
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; min-height: 60px;
        }
        .spec-btn:hover { border-color: #888; }
        .spec-btn.active { border-color: #000; box-shadow: 0 0 0 1px #000; background: #fafafa; color: #000; font-weight: 700; }
        .spec-btn img { width: 100%; height: 95px; object-fit: contain; margin-bottom: 8px; border-radius: 4px; background: #fdfdfd; }
        .spec-btn span { line-height: 1.3; font-size: 0.85rem; display: block; width: 100%; }

        .field-group { margin-bottom: 22px; }
        .field-group label { font-size: 0.85rem; color: #222; margin-bottom: 8px; display: block; font-weight: 700; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 0.95rem; box-sizing: border-box; }

        .btn-add { background: #111; color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; transition: background 0.2s; }
        .btn-add:hover { background: var(--primary); }

        /* 右側滑出式購物車抽屜 */
        .cart-drawer {
            position: fixed; top: 0; right: -400px; width: 360px; height: 100vh;
            background: var(--shopify-bg); box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 999; transition: right 0.3s ease; padding: 30px 25px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        .cart-drawer.open { right: 0; }
        .cart-drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .cart-drawer-title { font-size: 1.2rem; font-weight: 700; }
        .cart-drawer-close { cursor: pointer; font-size: 1.2rem; font-weight: bold; color: #999; }

        .free-ship-container { background: white; padding: 15px; border-radius: 6px; border: 1px solid #e1e1e1; margin-bottom: 20px; }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        .cart-list { flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        .cart-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 0; border-bottom: 1px dashed #ccc; position: relative; }
        .cart-item-info { padding-right: 40px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove { position: absolute; right: 0; top: 15px; color: #ff4d4d; cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -3px; margin-bottom: 8px; }
        .grand-total { border-top: 1px solid #e1e1e1; padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; color: #111; }
        .btn-copy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; }

        /* 彈出視窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #fff; padding: 35px 30px; border-radius: 12px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);

        .modal-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn-social { padding: 14px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; font-size: 1rem; color: white; border: none; display: block; }

        .btn-close { background: #e0e0e0; color: #333; cursor: pointer; }

<div id="cartDrawer" class="cart-drawer">

    document.getElementById('productDetailText').innerHTML = data.details || "暫無詳細材質規格說明，歡迎聯繫粉專洽詢。";

    // 塞入右側標題
    document.getElementById('productTitle').innerText = data.title || "客製化商品";
    const container = document.getElementById('dynamicFields');
    container.innerHTML = ""; 

    // 1. 渲染基礎品項
    let subGroup = document.createElement('div');
    subGroup.className = 'field-group';
    subGroup.innerHTML = `<label>1. 選擇品項與規格</label>`;
    let subGrid = document.createElement('div');
    subGrid.className = 'spec-grid';

    let isFirst = true;
    for(let k in data.sub) {
        let btn = document.createElement('div');
        btn.className = `spec-btn ${isFirst ? 'active' : ''}`;
        let imgHtml = data.sub[k].img ? `<img src="${data.sub[k].img}">` : "";
        btn.innerHTML = `${imgHtml}<span>${k}<br>($${data.sub[k].price})</span>`;
        btn.setAttribute('data-value', data.sub[k].price);
        btn.setAttribute('data-ship', data.sub[k].ship);
        btn.setAttribute('data-name', k);
        btn.onclick = function() {
            subGrid.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            updateLivePrice();
        };
        subGrid.appendChild(btn);
        isFirst = false;
    }
    subGroup.appendChild(subGrid);
    container.appendChild(subGroup);

    // 2. 渲染規格選項
    let specIndex = 2;
    for(let specName in data.specs) {
        let specGroup = document.createElement('div');
        specGroup.className = 'field-group';
        specGroup.innerHTML = `<label>${specIndex}. 選擇${specName}</label>`;
        let specGrid = document.createElement('div');
        specGrid.className = 'spec-grid';

        let isOptFirst = true;
        for(let opt in data.specs[specName]) {
            let val = data.specs[specName][opt];
            let btn = document.createElement('div');
            btn.className = `spec-btn ${isOptFirst ? 'active' : ''}`;
            let plusText = val.plus > 0 ? `<br>(+$${val.plus})` : (val.plus < 0 ? `<br>(-$${Math.abs(val.plus)})` : "");
            let imgHtml = val.img ? `<img src="${val.img}">` : "";
            btn.innerHTML = `${imgHtml}<span>${opt}${plusText}</span>`;
            
            btn.setAttribute('data-plus', val.plus || 0);
            btn.setAttribute('data-mult', val.mult || 1); 
            btn.setAttribute('data-specname', specName);
            btn.setAttribute('data-optname', opt);
            if(val.ship_override) btn.setAttribute('data-shipoverride', val.ship_override);

            btn.onclick = function() {
                specGrid.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateLivePrice();
            };
            specGrid.appendChild(btn);
            isOptFirst = false;
        }
        specGroup.appendChild(specGrid);
        container.appendChild(specGroup);
        specIndex++;
    }
    updateLivePrice();
}

function updateLivePrice() {
    const activeSubBtn = document.querySelector('#dynamicFields .field-group:first-child .spec-btn.active');
    if(!activeSubBtn) return;
    const base = parseInt(activeSubBtn.getAttribute('data-value'));
    const qty = parseInt(document.getElementById('qty').value) || 1;
    let extra = 0, mult = 1;

    document.querySelectorAll('#dynamicFields .field-group').forEach((group, idx) => {
        if(idx > 0) {
            let activeOpt = group.querySelector('.spec-btn.active');
            if(activeOpt) {
                extra += parseInt(activeOpt.getAttribute('data-plus') || 0);
                let m = parseFloat(activeOpt.getAttribute('data-mult'));
                if (!isNaN(m) && m !== 1) mult *= m;
            }
        }
    });
    let finalPrice = Math.round((base + extra) * mult);
    document.getElementById('targetPrice').innerText = `NT$ ${(finalPrice * qty).toLocaleString()}`;
}

// 放入購物車
function addToCart() {
    const activeSubBtn = document.querySelector('#dynamicFields .field-group:first-child .spec-btn.active');
    if(!activeSubBtn) return alert("請先選擇品項！");

    const itemName = activeSubBtn.getAttribute('data-name');
    let itemShip = activeSubBtn.getAttribute('data-ship') || 'small';
    const qty = parseInt(document.getElementById('qty').value) || 1;
    const basePrice = parseInt(activeSubBtn.getAttribute('data-value')) || 0;
    
    let specs = [], extra = 0, mult = 1;
    document.querySelectorAll('#dynamicFields .field-group').forEach((group, idx) => {
        if(idx > 0) {
            let activeOpt = group.querySelector('.spec-btn.active');
            if(activeOpt) {
                extra += parseInt(activeOpt.getAttribute('data-plus') || 0);
                let m = parseFloat(activeOpt.getAttribute('data-mult'));
                if (!isNaN(m) && m !== 1) mult *= m;
                specs.push(`${activeOpt.getAttribute('data-specname')}: ${activeOpt.getAttribute('data-optname')}`);
                if (activeOpt.getAttribute('data-shipoverride')) itemShip = activeOpt.getAttribute('data-shipoverride');
            }
        }
    });

    let finalPrice = Math.round((basePrice + extra) * mult);
    cart.push({ id: Date.now(), name: itemName, specs: specs.join(' / ') || "標準規格", price: finalPrice, qty: qty, ship: itemShip });
    
    saveCart();
    renderCart();
    toggleCart(true); 
}

renderProduct();
</script>

<script src="cart.js"></script>
