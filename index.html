<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 官方線上客製化估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 0;
            color: var(--text-dark);
        }

        .wrapper { 
            display: grid; 
            grid-template-columns: 55% 45%; 
            min-height: 100vh;
        }

        @media (max-width: 900px) { 
            .wrapper { grid-template-columns: 1fr; } 
        }

        /* 左側：配置填寫區 */
        .config-section { 
            padding: 40px 6% 40px 6%; 
            box-sizing: border-box;
        }
        
        .brand-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin: 30px 0 15px 0;
        }

        /* 圖片網格大項按鈕 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .category-btn img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #fdfdfd;
        }

        .category-btn span {
            font-size: 0.82rem;
            font-weight: 500;
            color: #444;
            line-height: 1.3;
        }

        .category-btn.active {
            border-color: #000000;
            box-shadow: 0 0 0 1.5px #000000;
            background: #fafafa;
        }
        .category-btn.active span { color: #000; font-weight: 700; }

        /* 💡 新增：客製化規格方塊按鈕組（帶圖片） */
        .spec-group-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: #444;
            margin: 20px 0 8px 0;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .option-card img {
            width: 100%;
            height: 90px;
            object-fit: contain;
            background: #fcfcfc;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        /* 當某規格被選中時 */
        .option-card.selected {
            border-color: var(--primary);
            background: #fffaf5;
            box-shadow: 0 0 0 1px var(--primary);
        }

        .option-card .opt-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #222;
        }

        .option-card .opt-price {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
            margin-top: 2px;
        }

        /* 數量輸入與基礎排版 */
        .field-group { margin-bottom: 18px; }
        label { font-size: 0.82rem; color: #666; margin-bottom: 6px; display: block; font-weight: 500; }
        input[type="number"], select.normal-select { 
            width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 0.95rem; box-sizing: border-box; 
        }

        /* 右側：Shopify 結帳欄 */
        .cart-section { 
            background: var(--shopify-bg); 
            padding: 40px 10% 40px 8%; 
            border-left: 1px solid #e1e1e1;
            box-sizing: border-box;
        }

        .free-ship-container {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e1e1;
            margin-bottom: 25px;
        }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        .cart-list { max-height: 350px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #e1e1e1;
            position: relative;
        }
        .cart-item-info { padding-right: 60px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove {
            position: absolute;
            right: 0;
            top: 15px;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .grand-total { 
            border-top: 1px solid #e1e1e1; 
            padding-top: 20px; 
            margin-top: 20px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #111; 
        }

        .btn-add {
            background: #111111; color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; letter-spacing: 1px; transition: background 0.2s; margin-top: 25px;
        }
        .btn-add:hover { background: var(--primary); }
        .btn-copy {
            background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 25px; transition: background 0.2s;
        }
        .btn-copy:hover { background: #d35400; }
        .hint-text { font-size: 0.75rem; color: #999; text-align: center; margin-top: 10px; }
    </style>
</head>

    </div>

let currentCategory = 'fire_staff_cyl';
// 儲存當前各規格被選中的 Key 值的暫存器
let selectedSelections = {}; 

function switchCategory(catKey, element) {
    currentCategory = catKey;
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    selectedSelections = {}; // 清空前一個項目的選擇快取
    renderSubFields();
}

// 💡 核心大改版：把下拉選單轉換為帶有圖片的常駐視覺方塊
function renderSubFields() {
    const data = db[currentCategory];
    const container = document.getElementById('dynamicFieldsArea');
    let html = "";

    // 1. 生成子品項結構方塊
    html += `<div class="spec-group-title">結構品項選擇</div>`;
    html += `<div class="option-grid" id="grid-subItem">`;
    let firstSubKey = Object.keys(data.sub)[0];
    if(!selectedSelections['subItem']) selectedSelections['subItem'] = firstSubKey;

    for(let k in data.sub) {
        let activeClass = (selectedSelections['subItem'] === k) ? 'selected' : '';
        let imgTag = data.sub[k].img ? `<img src="${data.sub[k].img}">` : `<img src="https://via.placeholder.com/150x90?text=${encodeURIComponent(k)}">`;
        html += `
            <div class="option-card ${activeClass}" onclick="selectCardOption('subItem', '${k}', ${data.sub[k].price}, '${data.sub[k].ship}', this)">
                ${imgTag}
                <span class="opt-name">${k}</span>
                <span class="opt-price">$${data.sub[k].price}</span>
            </div>
        `;
    }
    html += `</div>`;

    // 2. 循環生成各客製化規格方塊
    for(let specName in data.specs) {
        html += `<div class="spec-group-title">${specName}</div>`;
        
        // 💡 針對「總長度」這種不需看圖的規格，使用一般簡潔下拉選單，避免畫面過長
        if(specName === "總長度" || specName === "總長度規格") {
            let firstOptKey = Object.keys(data.specs[specName])[0];
            if(!selectedSelections[specName]) selectedSelections[specName] = firstOptKey;
            
            html += `<div class="field-group"><select class="normal-select spec-dropdown" data-specname="${specName}" onchange="selectDropdownOption('${specName}', this)">`;
            for(let opt in data.specs[specName]) {
                let selectedAttr = (selectedSelections[specName] === opt) ? 'selected' : '';
                let val = data.specs[specName][opt];
                let plusText = val.plus > 0 ? ` (+$${val.plus})` : (val.plus < 0 ? ` (-$${Math.abs(val.plus)})` : '');
                html += `<option value="${val.plus || 0}" ${selectedAttr}>${opt}${plusText}</option>`;
            }
            html += `</select></div>`;
        } else {
            // 其餘需要視覺對比的規格（火頭、握把、繩鍊）一律改造成視覺方塊按鈕
            html += `<div class="option-grid" id="grid-${specName}">`;
            let firstOptKey = Object.keys(data.specs[specName])[0];
            if(!selectedSelections[specName]) selectedSelections[specName] = firstOptKey;

            for(let opt in data.specs[specName]) {
                let val = data.specs[specName][opt];
                let activeClass = (selectedSelections[specName] === opt) ? 'selected' : '';
                let imgTag = val.img ? `<img src="${val.img}">` : `<img src="https://via.placeholder.com/150x90?text=${encodeURIComponent(opt)}">`;
                let plusText = val.plus > 0 ? `+$${val.plus}` : (val.plus < 0 ? `-$${Math.abs(val.plus)}` : '預設規格');
                let overrideAttr = val.ship_override ? `data-shipoverride="${val.ship_override}"` : '';

                html += `
                    <div class="option-card ${activeClass}" ${overrideAttr} data-plus="${val.plus || 0}" onclick="selectCardOption('${specName}', '${opt}', ${val.plus || 0}, null, this)">
                        ${imgTag}
                        <span class="opt-name">${opt}</span>
                        <span class="opt-price">${plusText}</span>
                    </div>
                `;
            }
            html += `</div>`;
        }
    }
    
    container.innerHTML = html;
    updateLivePrice();
}

// 處理方塊點擊切換
function selectCardOption(specName, optKey, priceOrPlus, shipType, element) {
    selectedSelections[specName] = optKey;
    
    // 讓同一個群組底下的其他方塊熄滅，當前點擊的亮起
    const parent = element.parentElement;
    parent.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
    element.classList.add('selected');

    updateLivePrice();
}

// 處理下拉長度選單切換
function selectDropdownOption(specName, el) {
    selectedSelections[specName] = el.value;
    updateLivePrice();
}

// 即時金額試算
function updateLivePrice() {
    let base = 0;
    let extra = 0;
    const qty = parseInt(document.getElementById('qty').value);

    // 找到被選取的基礎品項金額
    const subGrid = document.getElementById('grid-subItem');
    if(subGrid) {
        const selectedSub = subGrid.querySelector('.option-card.selected');
        if(selectedSub) {
            // 從數據庫抓取
            let name = selectedSelections['subItem'];
            base = db[currentCategory].sub[name].price;
        }
    }

    // 加總方塊按鈕的加價
    document.querySelectorAll('.option-grid').forEach(grid => {
        if(grid.id !== 'grid-subItem') {
            const selectedOpt = grid.querySelector('.option-card.selected');
            if(selectedOpt) {
                extra += parseInt(selectedOpt.getAttribute('data-plus') || 0);
            }
        }
    });

    // 加總下拉長度選單的加價
    document.querySelectorAll('.spec-dropdown').forEach(dropdown => {
        extra += parseInt(dropdown.value || 0);
    });

    document.getElementById('targetPrice').innerText = `NT$ ${((base + extra) * qty).toLocaleString()}`;
}

// --- 購物車與高級計費引擎 ---
let cart = [];

function addToCart() {
    const subName = selectedSelections['subItem'];
    const subData = db[currentCategory].sub[subName];
    const qty = parseInt(document.getElementById('qty').value);
    
    let basePrice = subData.price;
    let finalShip = subData.ship; 
    let specs = [];
    let extra = 0;

    // 讀取方塊加價項與運費覆蓋
    for(let specName in db[currentCategory].specs) {
        let chosenOpt = selectedSelections[specName];
        let optData = db[currentCategory].specs[specName][chosenOpt];
        
        extra += (optData.plus || 0);
        specs.push(`${specName}: ${chosenOpt}`);
        
        if(optData.ship_override) {
            finalShip = optData.ship_override;
        }
    }

    cart.push({
        id: Date.now(),
        name: subName,
        specs: specs.join(' / '),
        price: basePrice + extra,
        qty: qty,
        ship: finalShip
    });
    renderCart();
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cartList');
    let subTotal = 0;
    
    if(cart.length === 0) {
        list.innerHTML = `<p style="color:#999; text-align:center; padding: 40px 0;">清單內尚無道具，請從左側配置加入。</p>`;
        updatePrices(0, 0, "");
        return;
    }

    list.innerHTML = cart.map(i => {
        subTotal += (i.price * i.qty);
        return `<div class="cart-item">
            <div class="cart-item-info">
                <span class="cart-item-name">${i.name} × ${i.qty}</span>
                <span class="cart-item-spec">${i.specs}</span>
                <div class="cart-item-price">NT$ ${(i.price * i.qty).toLocaleString()}</div>
            </div>
            <span class="btn-remove" onclick="removeFromCart(${i.id})">移除</span>
        </div>`;
    }).join('');

    const shipInfo = calcShippingEngine(cart, subTotal);
    updatePrices(subTotal, shipInfo.fee, shipInfo.desc);
}

// 💡 終極運費引擎：一體式長棍滿額免運豁免規則
function calcShippingEngine(items, total) {
    const longQty = items.filter(i => i.ship === 'long').reduce((s, i) => s + i.qty, 0);
    const medQty = items.filter(i => i.ship === 'medium').reduce((s, i) => s + i.qty, 0);
    const smallQty = items.filter(i => i.ship === 'small').reduce((s, i) => s + i.qty, 0);

    let fee = 0;
    let desc = [];

    // 計算常規運費基礎
    if(longQty > 0) { fee += (longQty * 100); desc.push(`長棍獨立包裹 × ${longQty}支`); }
    if(medQty > 0) { let boxes = Math.ceil(medQty / 6); fee += (boxes * 100); desc.push(`中型道具包裹 × ${boxes}箱`); }
    if(smallQty > 0) { fee += 60; desc.push(`小型包裹`); }

    // 💡 執行「一體式長棍免運特赦令」規則判定
    if (longQty > 0) {
        // 如果購物車內含一體式長棍，不論金額多高，長棍必須【滿 3 支（含）以上】才能豁免運費
        if (longQty >= 3) {
            return { fee: 0, desc: "🎉 達一體長棍滿 3 支免運優惠！" };
        } else {
            // 未滿 3 支一體長棍，就算總額滿 5000 依然要收費
            return { fee: fee, desc: `⚠️ 一體長棍未滿3支不適用滿額免運。${desc.join(' + ')}` };
        }
    } else {
        // 如果購物車內【完全沒有】一體式長棍，則維持原本的「滿 5000 直接免運」
        if (total >= 5000) {
            return { fee: 0, desc: "🎉 達 NT$5,000 商店免運門檻！" };
        }
    }

    // 大宗大榮貨運安全閥封頂
    if(longQty >= 5 || fee >= 300) {
        return { fee: 300, desc: "🚛 訂單大宗：自動優化改走大榮貨運 (大箱收費)" };
    }

    return { fee: fee, desc: `物流計費：${desc.join(' + ')}` };
}

function updatePrices(sub, ship, desc) {
    document.getElementById('subTotal').innerText = `NT$ ${sub.toLocaleString()}`;
    document.getElementById('shipFee').innerText = `NT$ ${ship.toLocaleString()}`;
    document.getElementById('shipDesc').innerText = desc;
    document.getElementById('grandTotal').innerText = `NT$ ${(sub + ship).toLocaleString()}`;
    
    // 免運進度條動態提示
    const percent = Math.min((sub / 5000) * 100, 100);
    document.getElementById('shipFill').style.width = percent + '%';
    
    // 檢查車內是否有長棍來動態更換提示字眼
    const hasLong = cart.some(i => i.ship === 'long');
    const longCount = cart.filter(i => i.ship === 'long').reduce((s, i) => s + i.qty, 0);

    if (hasLong) {
        if (longCount >= 3) {
            document.getElementById('shipMsg').innerText = "🎉 已符合一體長棍 3 支免運資格！";
            document.getElementById('shipFill').style.width = '100%';
        } else {
            document.getElementById('shipMsg').innerText = `💡 一體長棍目前 ${longCount} 支，還差 ${3 - longCount} 支方可享有免運！`;
            document.getElementById('shipFill').style.width = '50%';
        }
    } else {
        document.getElementById('shipMsg').innerText = sub >= 5000 ? "🎉 已享受免運費優惠！" : `還差 NT$ ${(5000 - sub).toLocaleString()} 即可享有免運優惠`;
    }
}

function copyOrder() {
    if(cart.length === 0) return alert("清單是空的，請先加入道具規格！");
    let total = document.getElementById('grandTotal').innerText;
    let sub = document.getElementById('subTotal').innerText;
    let ship = document.getElementById('shipFee').innerText;
    let shipD = document.getElementById('shipDesc').innerText;

    let text = "【FPS 道具部 - 客製化估價清單】\n----------------------------------\n";
    cart.forEach((i, idx) => {
        text += `${idx + 1}. ● ${i.name} × ${i.qty}\n   規格明細：${i.specs}\n   小計金額：NT$ ${(i.price * i.qty).toLocaleString()}\n\n`;
    });
    text += `----------------------------------\n商品小計：${sub}\n物流運費：${ship} (${shipD})\n預估應付總額：${total}\n\n※ 此明細為線上客製化試算，最終項目確認與出貨時間以粉專私訊溝通為準。`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("🎉 明細已成功複製！\n請直接開啟臉書粉專私訊，點擊「貼上」傳送給我們即可下單。");
    });
}
