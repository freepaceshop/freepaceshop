<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 官方線上客製化估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 0;
            color: var(--text-dark);
        }

        .wrapper { 
            display: grid; 
            grid-template-columns: 55% 45%; 
            min-height: 100vh;
        }

        @media (max-width: 900px) { 
            .wrapper { grid-template-columns: 1fr; } 
        }

        /* 左側：配置填寫區 */
        .config-section { 
            padding: 40px 6% 40px 6%; 
            box-sizing: border-box;
        }
        
        .brand-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin: 30px 0 15px 0;
        }

        /* 圖片網格大項按鈕 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .category-btn img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #fdfdfd;
        }

        .category-btn span {
            font-size: 0.82rem;
            font-weight: 500;
            color: #444;
            line-height: 1.3;
        }

        .category-btn.active {
            border-color: #000000;
            box-shadow: 0 0 0 1.5px #000000;
            background: #fafafa;
        }
        .category-btn.active span { color: #000; font-weight: 700; }

        /* 💡 規格選項視覺化方塊按鈕 */
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .spec-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            font-size: 0.88rem;
            text-align: center;
            transition: all 0.2s ease;
            color: #444;
            font-weight: 500;
        }

        .spec-btn:hover {
            border-color: #888;
        }

        .spec-btn.active {
            border-color: #000000;
            box-shadow: 0 0 0 1px #000000;
            background: #fafafa;
            color: #000;
            font-weight: 700;
        }

        .field-group { margin-bottom: 22px; }
        .field-group label {
            font-size: 0.85rem;
            color: #222;
            margin-bottom: 8px;
            display: block;
            font-weight: 700;
        }

        input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 5px; 
            font-size: 0.95rem; 
            background: #fff;
            box-sizing: border-box;
        }

        .btn-add {
            background: #111111;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn-add:hover { background: var(--primary); }

        /* 右側：Shopify 結帳欄 */
        .cart-section { 
            background: var(--shopify-bg); 
            padding: 40px 10% 40px 8%; 
            border-left: 1px solid #e1e1e1;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 💡 移到右側頂部的即時大預覽圖 */
        .main-preview-box {
            background: white;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .main-preview-box img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 4px; }
        .preview-caption { font-size: 0.75rem; color: var(--primary); margin-top: 6px; font-weight: bold; display: block; }

        .free-ship-container {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e1e1;
            margin-bottom: 20px;
        }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        .cart-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #e1e1e1;
            position: relative;
        }
        .cart-item-info { padding-right: 60px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove { position: absolute; right: 0; top: 12px; color: #ff4d4d; cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -3px; margin-bottom: 8px; }
        .grand-total { border-top: 1px solid #e1e1e1; padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; color: #111; }

        .btn-copy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; }
        .btn-copy:hover { background: #d35400; }
        .hint-text { font-size: 0.72rem; color: #999; text-align: center; margin-top: 8px; }
    </style>
</head>

        </div>

        <button class="btn-add" onclick="addToCart()">加入詢價清單</button>
    </div>

    <div class="cart-section">

let currentCategory = 'fire_staff_cyl';

function switchCategory(catKey, element) {
    currentCategory = catKey;
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    renderSubFields();
}

// 💡 規格完全方塊化、按鈕化的核心渲染器
function renderSubFields() {
    const data = db[currentCategory];
    const container = document.getElementById('dynamicFields');
    container.innerHTML = ""; // 清空舊畫面

    // 1. 建立基礎子品項的按鈕網格
    let subGroup = document.createElement('div');
    subGroup.className = 'field-group';
    subGroup.innerHTML = `<label>結構品項與規格</label>`;
    let subGrid = document.createElement('div');
    subGrid.className = 'spec-grid';

    let isFirst = true;
    for(let k in data.sub) {
        let btn = document.createElement('div');
        btn.className = `spec-btn ${isFirst ? 'active' : ''}`;
        btn.innerText = `${k} ($${data.sub[k].price})`;
        // 將核心數據藏在按鈕屬性中
        btn.setAttribute('data-value', data.sub[k].price);
        btn.setAttribute('data-ship', data.sub[k].ship);
        btn.setAttribute('data-img', data.sub[k].img || '');
        btn.setAttribute('data-name', k);
        btn.onclick = function() {
            subGrid.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            triggerImageAndPriceEngine();
        };
        subGrid.appendChild(btn);
        isFirst = false;
    }
    subGroup.appendChild(subGrid);
    container.appendChild(subGroup);

    // 💡 智慧精簡核心：如果設定了 hideExtraSpecs，則不渲染後續的任何追加規格選單
    if(data.hideExtraSpecs) {
        triggerImageAndPriceEngine();
        return;
    }

    // 2. 循環建立選配變體的按鈕網格
    for(let specName in data.specs) {
        let specGroup = document.createElement('div');
        specGroup.className = 'field-group';
        specGroup.innerHTML = `<label>${specName}</label>`;
        let specGrid = document.createElement('div');
        specGrid.className = 'spec-grid';

        let isOptFirst = true;
        for(let opt in data.specs[specName]) {
            let val = data.specs[specName][opt];
            let btn = document.createElement('div');
            btn.className = `spec-btn ${isOptFirst ? 'active' : ''}`;
            
            let plusText = val.plus > 0 ? ` (+$${val.plus})` : (val.plus < 0 ? ` (-$${Math.abs(val.plus)})` : '');
            btn.innerText = `${opt}${plusText}`;
            
            btn.setAttribute('data-plus', val.plus || 0);
            btn.setAttribute('data-img', val.img || '');
            btn.setAttribute('data-specname', specName);
            btn.setAttribute('data-optname', opt);
            if(val.ship_override) btn.setAttribute('data-shipoverride', val.ship_override);

            btn.onclick = function() {
                specGrid.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                triggerImageAndPriceEngine();
            };
            specGrid.appendChild(btn);
            isOptFirst = false;
        }
        specGroup.appendChild(specGrid);
        container.appendChild(specGroup);
    }
    
    triggerImageAndPriceEngine();
}

// 💡 雙重連動預覽圖＋計價黑科技引擎
function triggerImageAndPriceEngine() {
    const mainImgEl = document.getElementById('mainPreviewImg');
    const captionEl = document.getElementById('previewCaption');

    let activeImg = "";
    let activeLabel = "商品基礎外觀";

    // 1. 抓取目前點選的基礎品項按鈕
    const activeSubBtn = document.querySelector('#dynamicFields .spec-grid .spec-btn.active');
    if (activeSubBtn) {
        let subImg = activeSubBtn.getAttribute('data-img');
        if (subImg && subImg.trim() !== "") {
            activeImg = subImg;
            activeLabel = activeSubBtn.getAttribute('data-name');
        }
    }

    // 2. 核心覆蓋：如果客製化按鈕（如：加厚握把）有獨立圖片，將強制更新預覽圖！
    document.querySelectorAll('#dynamicFields .field-group .spec-grid').forEach((grid, idx) => {
        if(idx > 0) { // 跳過第一個基礎品項網格
            let activeOptBtn = grid.querySelector('.spec-btn.active');
            if(activeOptBtn) {
                let optImg = activeOptBtn.getAttribute('data-img');
                if(optImg && optImg.trim() !== "") {
                    activeImg = optImg;
                    activeLabel = `${activeOptBtn.getAttribute('data-specname')}: ${activeOptBtn.getAttribute('data-optname')}`;
                }
            }
        }
    });

    // 3. 渲染預覽大圖
    if (activeImg && activeImg.trim() !== "") {
        mainImgEl.src = activeImg;
        captionEl.innerText = `🔍 客製化細節：${activeLabel}`;
    } else {
        // 如果目前沒上傳對應規格圖，就帶入預設圖防破圖
        mainImgEl.src = "https://via.placeholder.com/400x220?text=FPS+FIRE+PROPS";
        captionEl.innerText = "FPS 專業手工道具製作";
    }

    updateLivePrice();
}

function updateLivePrice() {
    const activeSubBtn = document.querySelector('#dynamicFields .field-group:first-child .spec-btn.active');
    if(!activeSubBtn) return;

    const base = parseInt(activeSubBtn.getAttribute('data-value'));
    const qty = parseInt(document.getElementById('qty').value);
    
    let extra = 0;
    // 累加其他所有亮起狀態的客製化方塊加價金額
    document.querySelectorAll('#dynamicFields .field-group').forEach((group, idx) => {
        if(idx > 0) {
            let activeOpt = group.querySelector('.spec-btn.active');
            if(activeOpt) extra += parseInt(activeOpt.getAttribute('data-plus') || 0);
        }
    });

    document.getElementById('targetPrice').innerText = `NT$ ${((base + extra) * qty).toLocaleString()}`;
}

// --- 購物車與計費階梯 ---
function addToCart() {
    const activeSubBtn = document.querySelector('#dynamicFields .field-group:first-child .spec-btn.active');
    if(!activeSubBtn) return;

    const itemName = activeSubBtn.getAttribute('data-name');
    let itemShip = activeSubBtn.getAttribute('data-ship');
    const qty = parseInt(document.getElementById('qty').value);
    const base = parseInt(activeSubBtn.getAttribute('data-value'));
    
    let specs = [];
    let extra = 0;

    document.querySelectorAll('#dynamicFields .field-group').forEach((group, idx) => {
        if(idx > 0) {
            let activeOpt = group.querySelector('.spec-btn.active');
            if(activeOpt) {
                extra += parseInt(activeOpt.getAttribute('data-plus') || 0);
                specs.push(`${activeOpt.getAttribute('data-specname')}: ${activeOpt.getAttribute('data-optname')}`);
                
                let override = activeOpt.getAttribute('data-shipoverride');
                if (override) itemShip = override;
            }
        }
    });

    cart.push({
        id: Date.now(),
        name: itemName,
        specs: specs.length > 0 ? specs.join(' / ') : "標準原廠配備",
        price: base + extra,
        qty: qty,
        ship: itemShip
    });
    renderCart();
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cartList');
    let subTotal = 0;
    
    if(cart.length === 0) {
        list.innerHTML = `<p style="color:#999; text-align:center; padding: 20px 0;">清單內尚無道具，請從左側配置加入。</p>`;
        updatePrices(0, 0, "");
        return;
    }

    list.innerHTML = cart.map(i => {
        subTotal += (i.price * i.qty);
        return `<div class="cart-item">
            <div class="cart-item-info">
                <span class="cart-item-name">${i.name} × ${i.qty}</span>
                <span class="cart-item-spec">${i.specs}</span>
                <div class="cart-item-price">NT$ ${(i.price * i.qty).toLocaleString()}</div>
            </div>
            <span class="btn-remove" onclick="removeFromCart(${i.id})">移除</span>
        </div>`;
    }).join('');

    const shipInfo = calcShippingEngine(cart, subTotal);
    updatePrices(subTotal, shipInfo.fee, shipInfo.desc);
}

function calcShippingEngine(items, total) {
    if(total >= 5000) return { fee: 0, desc: "🎉 達 NT$5,000 免運門檻！" };

    const longQty = items.filter(i => i.ship === 'long').reduce((s, i) => s + i.qty, 0);
    const medQty = items.filter(i => i.ship === 'medium').reduce((s, i) => s + i.qty, 0);

    let fee = 0;
    let desc = [];

    if(longQty > 0) { fee += (longQty * 100); desc.push(`長棍獨立包裹 × ${longQty}支`); }
    if(medQty > 0) { let boxes = Math.ceil(medQty / 6); fee += (boxes * 100); desc.push(`中型道具包裹 × ${boxes}箱`); }
    if(items.filter(i => i.ship === 'small').reduce((s, i) => s + i.qty, 0) > 0) { fee += 60; desc.push(`小型包裹`); }

    if(longQty >= 5 || fee >= 300) {
        return { fee: 300, desc: "🚛 訂單大宗：自動優化改走大榮貨運 (大箱收費)" };
    }

    return { fee: fee, desc: `優化物流組合：${desc.join(' + ')}` };
}

function updatePrices(sub, ship, desc) {
    document.getElementById('subTotal').innerText = `NT$ ${sub.toLocaleString()}`;
    document.getElementById('shipFee').innerText = `NT$ ${ship.toLocaleString()}`;
    document.getElementById('shipDesc').innerText = desc;
    document.getElementById('grandTotal').innerText = `NT$ ${(sub + ship).toLocaleString()}`;
    
    const percent = Math.min((sub / 5000) * 100, 100);
    document.getElementById('shipFill').style.width = percent + '%';
    document.getElementById('shipMsg').innerText = sub >= 5000 ? "🎉 已享受免運費優惠！" : `還差 NT$ ${(5000 - sub).toLocaleString()} 即可享有免運優惠`;
}

function copyOrder() {
    if(cart.length === 0) return alert("清單是空的，請先加入道具規格！");
    let total = document.getElementById('grandTotal').innerText;
    let sub = document.getElementById('subTotal').innerText;
    let ship = document.getElementById('shipFee').innerText;
    let shipD = document.getElementById('shipDesc').innerText;

    let text = "【FPS 道具部 - 客製化估價清單】\n----------------------------------\n";
    cart.forEach((i, idx) => {
        text += `${idx + 1}. ● ${i.name} × ${i.qty}\n   規格明細：${i.specs}\n   小計金額：NT$ ${(i.price * i.qty).toLocaleString()}\n\n`;
    });
    text += `----------------------------------\n商品小計：${sub}\n物流運費：${ship} (${shipD})\n預估應付總額：${total}\n\n※ 此明細為線上客製化試算，最終項目確認與出貨時間以粉專私訊溝通為準。`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("🎉 明細已成功複製！\n請直接開啟臉書粉專私訊，點擊「貼上」傳送給我們即可下單。");
    });
}

// 首次載入初始化
renderSubFields();
