<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 官方線上客製化估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 0;
            color: var(--text-dark);
        }

        .wrapper { 
            display: grid; 
            grid-template-columns: 55% 45%; 
            min-height: 100vh;
        }

        @media (max-width: 900px) { 
            .wrapper { grid-template-columns: 1fr; } 
        }

        /* 左側：配置填寫區 */
        .config-section { 
            padding: 40px 6% 40px 6%; 
            box-sizing: border-box;
        }
        
        .brand-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin: 30px 0 15px 0;
        }

        /* 圖片網格大項按鈕 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .category-btn img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #fdfdfd;
        }

        .category-btn span {
            font-size: 0.82rem;
            font-weight: 500;
            color: #444;
            line-height: 1.3;
        }

        .category-btn.active {
            border-color: #000000;
            box-shadow: 0 0 0 1.5px #000000;
            background: #fafafa;
        }
        .category-btn.active span {
            color: #000;
            font-weight: 700;
        }

        /* 表單欄位 */
        .field-group { margin-bottom: 18px; }
        label {
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 5px; 
            font-size: 0.95rem; 
            background: #fff;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        select:focus, input:focus {
            border-color: #000000;
            box-shadow: 0 0 0 1px #000000;
            outline: none;
        }

        /* 規格預覽圖 */
        .option-preview { 
            margin: 20px 0; 
            background: #fafafa; 
            border: 1px dashed var(--border-color); 
            border-radius: 6px; 
            padding: 12px; 
            display: none; 
            text-align: center;
        }
        .option-preview img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 4px; }

        .btn-add {
            background: #111111;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn-add:hover { background: var(--primary); }

        /* 右側：Shopify 結帳欄 */
        .cart-section { 
            background: var(--shopify-bg); 
            padding: 40px 10% 40px 8%; 
            border-left: 1px solid #e1e1e1;
            box-sizing: border-box;
        }

        .free-ship-container {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e1e1;
            margin-bottom: 25px;
        }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        .cart-list { max-height: 350px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #e1e1e1;
            position: relative;
        }
        .cart-item-info { padding-right: 60px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove {
            position: absolute;
            right: 0;
            top: 15px;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .grand-total { 
            border-top: 1px solid #e1e1e1; 
            padding-top: 20px; 
            margin-top: 20px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #111; 
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 25px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #d35400; }
        .hint-text { font-size: 0.75rem; color: #999; text-align: center; margin-top: 10px; }
    </style>
</head>

<div class="wrapper">

        <h2>1. 選擇道具大項</h2>
        <div class="category-grid" id="categoryGrid">

                <span>火長棍<br>圓柱火頭</span>
            </div>
            <div class="category-btn" onclick="switchCategory('fire_staff_twi', this)">
                <img src="https://via.placeholder.com/150x90?text=Fire+Staff+Twi" alt="火長棍-Twista">
                <span>火長棍<br>Twista火頭</span>
            </div>
            <div class="category-btn" onclick="switchCategory('fire_short_cyl', this)">

                <span>火Poi-可拆式<br>(一組2顆)</span>

            <div class="category-btn" onclick="switchCategory('fire_meteor_det', this)">

                <span>火流星<br>可拆式(2顆)</span>
            </div>
            <div class="category-btn" onclick="switchCategory('fire_poi_one', this)">
                <img src="https://via.placeholder.com/150x90?text=Poi+Solid" alt="火Poi-一體式">
                <span>火Poi<br>一體式</span>
            </div>
            <div class="category-btn" onclick="switchCategory('fire_other', this)">
                <img src="https://via.placeholder.com/150x90?text=Fire+Other" alt="其他火具">
                <span>小火棒<br>太極火 / 龍棍</span>
            </div>
            <div class="category-btn" onclick="switchCategory('prac_staff_long', this)">
                <img src="https://via.placeholder.com/150x90?text=Prac+Staff+Long" alt="練習長棍">
                <span>練習長棍<br>一體 / 組合</span>
            </div>
            <div class="category-btn" onclick="switchCategory('prac_staff_short', this)">
                <img src="https://via.placeholder.com/150x90?text=Prac+Staff+Short" alt="練習短棍">
                <span>練習短棍<br>一體式</span>
            </div>
            <div class="category-btn" onclick="switchCategory('prac_poi_meteor', this)">
                <img src="https://via.placeholder.com/150x90?text=Prac+Poi+Meteor" alt="練習球類">
                <span>練習 Poi<br>練習流星系列</span>
            </div>
        </div>

        <h2>2. 客製化規格配置</h2>
        <div id="dynamicFields"></div>

        <div class="field-group">
            <label>數量</label>
            <input type="number" id="qty" value="1" min="1" onchange="updateLivePrice()">
        </div>

        <div id="optionPreview" class="option-preview">
            <label style="color:var(--primary); font-size: 11px; text-align:left; display:block; margin-bottom:5px;">🔍 規格樣品細節預覽：</label>
            <img id="detailImg" src="">
        </div>

        <button class="btn-add" onclick="addToCart()">加入詢價清單</button>
    </div>

    <div class="cart-section">
        <div class="free-ship-container">
            <div class="free-ship-bar"><div id="shipFill" class="free-ship-fill"></div></div>
            <div id="shipMsg" class="free-ship-msg">正在計算免運進度...</div>
        </div>

        <div class="brand-title" style="font-size:1.1rem; border:none; margin-bottom:15px; padding:0;">明細回報清單</div>
        
        <div id="cartList" class="cart-list">
            <p style="color:#999; text-align:center; padding: 40px 0;">清單內尚無道具，請從左側配置加入。</p>
        </div>

        <div class="summary-row"><span>商品小計</span><span id="subTotal">NT$ 0</span></div>
        <div class="summary-row"><span>預估運費</span><span id="shipFee">NT$ 0</span></div>
        <div id="shipDesc" class="ship-desc"></div>
        
        <div class="grand-total"><span>總計</span><span id="grandTotal">NT$ 0</span></div>
        
        <button class="btn-copy" onclick="copyOrder()">複製清單明細 (私訊下單用)</button>
        <div class="hint-text">點擊複製後，請直接貼給 FPS 道具部粉專私訊即可！</div>
    </div>
</div>
