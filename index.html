<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 官方線上客製化估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 0;
            color: var(--text-dark);
        }

        .wrapper { display: grid; grid-template-columns: 55% 45%; min-height: 100vh; }
        @media (max-width: 900px) { .wrapper { grid-template-columns: 1fr; } }

        /* 左側：配置填寫區 */
        .config-section { padding: 40px 6%; box-sizing: border-box; }
        .brand-title { font-size: 1.6rem; font-weight: 700; color: #111; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h2 { font-size: 1.1rem; font-weight: 500; color: var(--primary); margin: 30px 0 15px 0; }

        /* 圖片網格大項按鈕 */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .category-btn {
            background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; 
            cursor: pointer; text-align: center; transition: all 0.2s ease; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .category-btn img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; border-radius: 4px; background: #fdfdfd; }
        .category-btn span { font-size: 0.82rem; font-weight: 500; color: #444; line-height: 1.3; }
        .category-btn.active { border-color: #000; box-shadow: 0 0 0 1.5px #000; background: #fafafa; }
        .category-btn.active span { color: #000; font-weight: 700; }

        /* 規格選項視覺化方塊按鈕 */
        .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .spec-btn {
            background: #fff; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px;
            cursor: pointer; font-size: 0.88rem; text-align: center; transition: all 0.2s ease; color: #444; font-weight: 500;
        }
        .spec-btn:hover { border-color: #888; }
        .spec-btn.active { border-color: #000; box-shadow: 0 0 0 1px #000; background: #fafafa; color: #000; font-weight: 700; }

        .field-group { margin-bottom: 22px; }
        .field-group label { font-size: 0.85rem; color: #222; margin-bottom: 8px; display: block; font-weight: 700; }

        input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 0.95rem; }

        .btn-add { background: #111; color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; transition: background 0.2s; }
        .btn-add:hover { background: var(--primary); }

        /* 右側：Shopify 結帳欄 */
        .cart-section { background: var(--shopify-bg); padding: 40px 8%; border-left: 1px solid #e1e1e1; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }

        /* 即時大預覽圖 */
        .main-preview-box { background: white; border: 1px solid #e1e1e1; border-radius: 8px; padding: 10px; margin-bottom: 20px; text-align: center; }
        .main-preview-box img { width: 100%; max-height: 220px; object-fit: contain; border-radius: 4px; transition: opacity 0.3s ease; }
        .preview-caption { font-size: 0.75rem; color: var(--primary); margin-top: 6px; font-weight: bold; display: block; }

        .free-ship-container { background: white; padding: 15px; border-radius: 6px; border: 1px solid #e1e1e1; margin-bottom: 20px; }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        .cart-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px dashed #ccc; position: relative; }
        .cart-item-info { padding-right: 60px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove { position: absolute; right: 0; top: 12px; color: #ff4d4d; cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -3px; margin-bottom: 8px; }
        .grand-total { border-top: 1px solid #e1e1e1; padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; color: #111; }

        .btn-copy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; }
        .btn-copy:hover { background: #d35400; }
