<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 線上客製化估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e67e22; 
            --shopify-bg: #f5f5f5; 
            --text-dark: #333333;
            --border-color: #d9d9d9;
            --accent-green: #27ae60;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: 0;
            color: var(--text-dark);
        }

        /* Shopify 經典雙分欄排版 */
        .wrapper { 
            display: grid; 
            grid-template-columns: 55% 45%; 
            min-height: 100vh;
        }

        @media (max-width: 900px) { 
            .wrapper { grid-template-columns: 1fr; } 
        }

        /* 左側：規格配置填寫區 */
        .config-section { 
            padding: 40px 8% 40px 10%; 
            box-sizing: border-box;
        }
        
        .brand-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 30px;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin: 25px 0 15px 0;
        }

        .field-group { margin-bottom: 18px; }
        label {
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 5px; 
            font-size: 0.95rem; 
            background: #fff;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        select:focus, input:focus {
            border-color: #000000;
            box-shadow: 0 0 0 1px #000000;
            outline: none;
        }

        /* 左側動態規格預覽圖 */
        .option-preview { 
            margin: 20px 0; 
            background: #fafafa; 
            border: 1px dashed var(--border-color); 
            border-radius: 6px; 
            padding: 12px; 
            display: none; 
            text-align: center;
        }
        .option-preview img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 4px; }

        .btn-add {
            background: #111111;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn-add:hover { background: var(--primary); }

        /* 右側：Shopify 結帳明細欄 */
        .cart-section { 
            background: var(--shopify-bg); 
            padding: 40px 10% 40px 8%; 
            border-left: 1px solid #e1e1e1;
            box-sizing: border-box;
        }

        /* 滿額免運進度條 */
        .free-ship-container {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e1e1;
            margin-bottom: 25px;
        }
        .free-ship-bar { background: #e1e1e1; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .free-ship-fill { background: var(--accent-green); height: 100%; width: 0%; transition: width 0.4s ease; }
        .free-ship-msg { font-size: 0.85rem; color: #444; font-weight: 500; }

        /* 購物車清單 */
        .cart-list { max-height: 350px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 0;
            border-bottom: 1px solid #e1e1e1;
            position: relative;
        }
        .cart-item-info { padding-right: 60px; }
        .cart-item-name { font-weight: 500; font-size: 0.95rem; color: #111; }
        .cart-item-spec { font-size: 0.8rem; color: #737373; display: block; margin-top: 4px; line-height: 1.4; }
        .cart-item-price { font-weight: 600; font-size: 0.95rem; color: #111; margin-top: 5px; }
        .btn-remove {
            position: absolute;
            right: 0;
            top: 15px;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
        }

        /* 費用總計區 */
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #555; }
        .ship-desc { font-size: 0.75rem; color: #888; text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .grand-total { 
            border-top: 1px solid #e1e1e1; 
            padding-top: 20px; 
            margin-top: 20px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #111; 
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 25px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #d35400; }
        .hint-text { font-size: 0.75rem; color: #999; text-align: center; margin-top: 10px; }
    </style>
</head>

function renderSubFields() {
    const cat = document.getElementById('mainCat').value;
    const data = db[cat];
    const container = document.getElementById('dynamicFields');
    
    // 1. 生成具體子品項
    let html = `<div class="field-group"><label>結構與基礎品項</label><select id="subItem" onchange="handleSelectChange(this, 'main')">`;
    for(let k in data.sub) {
        html += `<option value="${data.sub[k].price}" data-img="${data.sub[k].img}" data-ship="${data.sub[k].ship}">${k}</option>`;
    }
    html += `</select></div>`;

    // 2. 循環生成客製化規格選項
    for(let specName in data.specs) {
        html += `<div class="field-group"><label>${specName}</label><select class="spec-opt" data-specname="${specName}" onchange="handleSelectChange(this, 'detail')">`;
        for(let opt in data.specs[specName]) {
            let val = data.specs[specName][opt];
            let plusText = val.plus > 0 ? ` (+$${val.plus})` : (val.plus < 0 ? ` (-$${Math.abs(val.plus)})` : '');
            html += `<option value="${val.plus || 0}" data-img="${val.img || ''}">${opt}${plusText}</option>`;
        }
        html += `</select></div>`;
    }
    
    container.innerHTML = html;
    // 隱藏前一次的預覽圖
    document.getElementById('optionPreview').style.display = 'none';
    updateLivePrice();
}

// 處理選單切換與圖片聯動
function handleSelectChange(el, type) {
    const imgUrl = el.selectedOptions[0].getAttribute('data-img');
    const previewBox = document.getElementById('optionPreview');
    const detailImg = document.getElementById('detailImg');

    if(imgUrl && imgUrl.trim() !== "") {
        previewBox.style.display = 'block';
        detailImg.src = imgUrl;
    } else if(type === 'main') {
        previewBox.style.display = 'none';
    }
    updateLivePrice();
}

// 即時計算左側配置當前金額
function updateLivePrice() {
    const base = parseInt(document.getElementById('subItem').value);
    const qty = parseInt(document.getElementById('qty').value);
    let extra = 0;
    document.querySelectorAll('.spec-opt').forEach(s => extra += parseInt(s.value));
    document.getElementById('targetPrice').innerText = `NT$ ${((base + extra) * qty).toLocaleString()}`;
}

// --- 購物車核心運算 ---
function addToCart() {
    const itemEl = document.getElementById('subItem');
    const itemName = itemEl.selectedOptions[0].text;
    const itemShip = itemEl.selectedOptions[0].getAttribute('data-ship');
    const qty = parseInt(document.getElementById('qty').value);
    const base = parseInt(itemEl.value);
    
    let specs = [];
    let extra = 0;
    document.querySelectorAll('.spec-opt').forEach(s => {
        extra += parseInt(s.value);
        specs.push(`${s.getAttribute('data-specname')}: ${s.selectedOptions[0].text}`);
    });

    cart.push({
        id: Date.now(),
        name: itemName,
        specs: specs.join(' / '),
        price: base + extra,
        qty: qty,
        ship: itemShip
    });
    renderCart();
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cartList');
    let subTotal = 0;
    
    if(cart.length === 0) {
        list.innerHTML = `<p style="color:#999; text-align:center; padding: 40px 0;">清單內尚無道具，請從左側配置加入。</p>`;
        updatePrices(0, 0, "");
        return;
    }

    list.innerHTML = cart.map(i => {
        subTotal += (i.price * i.qty);
        return `<div class="cart-item">
            <div class="cart-item-info">
                <span class="cart-item-name">${i.name} × ${i.qty}</span>
                <span class="cart-item-spec">${i.specs}</span>
                <div class="cart-item-price">NT$ ${(i.price * i.qty).toLocaleString()}</div>
            </div>
            <span class="btn-remove" onclick="removeFromCart(${i.id})">移除</span>
        </div>`;
    }).join('');

    const shipInfo = calcShippingEngine(cart, subTotal);
    updatePrices(subTotal, shipInfo.fee, shipInfo.desc);
}

// --- 進階階梯式運費計費核心引擎 ---
function calcShippingEngine(items, total) {
    // 滿 5000 觸發商店最高免運權益
    if(total >= 5000) return { fee: 0, desc: "🎉 達 NT$5,000 免運門檻！" };

    // 彙整各運費結構的實體數量
    const longQty = items.filter(i => i.ship === 'long').reduce((s, i) => s + i.qty, 0);
    const medQty = items.filter(i => i.ship === 'medium').reduce((s, i) => s + i.qty, 0);
    const smallQty = items.filter(i => i.ship === 'small').reduce((s, i) => s + i.qty, 0);

    let fee = 0;
    let desc = [];

    // A. 長棍計費：每支獨立包裝 100 元
    if(longQty > 0) { 
        fee += (longQty * 100); 
        desc.push(`長棍獨立寄送 × ${longQty}支`); 
    }
    
    // B. 短棍/中型計費：每 6 支包裝成一箱 100 元
    if(medQty > 0) { 
        let boxes = Math.ceil(medQty / 6); 
        fee += (boxes * 100); 
        desc.push(`中型道具包裹 × ${boxes}箱`); 
    }
    
    // C. 小型件計費：若有混合中長道具，則加收一筆 60 元獨立小包裹或合箱包材費；若僅有小件，則單獨一箱 60 元
    if(smallQty > 0) { 
        fee += 60; 
        desc.push(`小型包裹 (i郵箱/郵局)`); 
    }

    // D. 貨運封頂安全閥：長棍大於等於 5 支，或累加總運費達到 300 元以上，自動改走大榮大箱貨運固定 300 元
    if(longQty >= 5 || fee >= 300) {
        return { fee: 300, desc: "🚛 訂單大宗：自動優化改走大榮貨運 (大箱收費)" };
    }

    return { fee: fee, desc: `優化物流組合：${desc.join(' + ')}` };
}

// 更新進度條與右側各項結算金額
function updatePrices(sub, ship, desc) {
    document.getElementById('subTotal').innerText = `NT$ ${sub.toLocaleString()}`;
    document.getElementById('shipFee').innerText = `NT$ ${ship.toLocaleString()}`;
    document.getElementById('shipDesc').innerText = desc;
    document.getElementById('grandTotal').innerText = `NT$ ${(sub + ship).toLocaleString()}`;
    
    // 免運進度條公式
    const percent = Math.min((sub / 5000) * 100, 100);
    document.getElementById('shipFill').style.width = percent + '%';
    document.getElementById('shipMsg').innerText = sub >= 5000 ? "🎉 已享受免運費優惠！" : `還差 NT$ ${(5000 - sub).toLocaleString()} 即可享有免運優惠`;
}

// 一鍵複製訂單資訊
function copyOrder() {
    if(cart.length === 0) {
        alert("清單是空的，請先加入道具規格！");
        return;
    }
    let total = document.getElementById('grandTotal').innerText;
    let sub = document.getElementById('subTotal').innerText;
    let ship = document.getElementById('shipFee').innerText;
    let shipD = document.getElementById('shipDesc').innerText;

    let text = "【FPS 道具部 - 客製化估價清單】\n----------------------------------\n";
    cart.forEach((i, idx) => {
        text += `${idx + 1}. ● ${i.name} × ${i.qty}\n   規格明細：${i.specs}\n   小計金額：NT$ ${(i.price * i.qty).toLocaleString()}\n\n`;
    });
    text += `----------------------------------\n商品小計：${sub}\n物流運費：${ship} (${shipD})\n預估應付總額：${total}\n\n※ 此明細為線上客製化試算，最終項目確認與出貨時間以粉專私訊溝通為準。`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("🎉 明細已成功複製！\n請直接開啟臉書粉專私訊，點擊「貼上」傳送給我們即可下單。");
    });
}

// 初始化首次渲染
renderSubFields();
</script>
