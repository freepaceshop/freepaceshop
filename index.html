<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 道具部 - 官方線上商店</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e67e22; --bg: #f5f5f5; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; }
        .nav-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #ffffff; border-bottom: 1px solid #eee;
        }
        .nav-logo { font-size: 1.4rem; font-weight: 700; color: #111; text-decoration: none; }
        
        .main-container { max-width: 1000px; margin: 50px auto; padding: 0 5%; text-align: center; }
        .main-container h1 { font-size: 2rem; color: #111; margin-bottom: 40px; }

        .big-cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .big-cat-card {
            background: #fff; border-radius: 12px; padding: 40px 20px; text-decoration: none;
            color: #111; font-weight: 700; font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;
        }
        .big-cat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: var(--primary); }
        .cat-icon { font-size: 3rem; display: block; margin-bottom: 15px; }
        .cat-sub { display: block; font-size: 0.9rem; color: #666; font-weight: 400; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="nav-logo">FPS 道具部</a>
</div>

<div class="main-container">
    <h1>歡迎來到 FPS 道具部</h1>
    <div class="big-cat-grid">
        <a href="products.html?cat=fire" class="big-cat-card">
            <span class="cat-icon">🔥</span>
            火舞道具專區
            <span class="cat-sub">火棍、Poi、流星、火具配件</span>
        </a>
        <a href="products.html?cat=prac" class="big-cat-card">
            <span class="cat-icon">✨</span>
            練習道具專區
            <span class="cat-sub">耐摔練習長短棍、練習Poi</span>
        </a>
        <a href="products.html?cat=material" class="big-cat-card">
            <span class="cat-icon">🛠️</span>
            周邊配件與材料
            <span class="cat-sub">培林握把、鐵鍊、快接、防火布</span>
        </a>
    </div>
</div>

</body>
</html>
